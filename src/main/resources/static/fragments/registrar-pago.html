<main class="flex justify-center items-start min-h-screen p-4 pt-8">
  <div class="w-full max-w-4xl">
    <!-- HEADER -->
    <header class="page-header mb-4">
      <div class="page-header-icon">
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
      <div class="page-header-content">
        <h1 class="page-header-title">Registrar Pago</h1>
        <p class="page-header-subtitle">Nuevo cobro a socio</p>
      </div>
      <div class="page-header-actions">
        <button onclick="history.back()" class="btn-outline btn-sm">
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"
            />
          </svg>
          <span>Volver</span>
        </button>
      </div>
    </header>

    <!-- CARD PRINCIPAL (Removido outer container para usar glass-cards directas) -->

    <!-- FORMULARIO -->
    <form id="pagoForm" class="flex flex-col gap-4">
      <!-- PANEL 1: DATOS GENERALES (Socio, Empleado, Medio Pago) -->
      <div class="glass-card flex flex-col p-4 mb-4">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-5 items-start">
          <!-- BUSCAR SOCIO -->
          <div class="form-group relative md:col-span-6">
            <label
              class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
              >Socio <span class="text-[var(--orange)]">*</span></label
            >
            <div class="relative w-full">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <svg
                  class="h-4 w-4 text-gray-500"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
                  />
                </svg>
              </div>
              <input
                type="text"
                id="buscarSocio"
                placeholder="Buscar por nombre o DNI"
                autocomplete="off"
                class="w-full bg-transparent text-[var(--beige)] text-base border-b border-[#333] pb-2 pl-10 focus:outline-none focus:border-[var(--orange)] transition-colors placeholder-gray-700"
              />
            </div>
            <ul
              id="resultadosSocio"
              class="search-results hidden absolute w-full z-50 mt-2 max-h-60 overflow-y-auto bg-[#0a0a0a] backdrop-blur-xl border border-[#222] rounded-xl shadow-2xl custom-scrollbar text-sm"
            ></ul>
          </div>

          <!-- EMPLEADO -->
          <div class="form-group relative md:col-span-3">
            <label
              class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
              >Empleado</label
            >
            <select
              id="empleado"
              class="w-full bg-transparent text-[var(--beige)] text-base border-b border-[#333] pb-2 focus:outline-none focus:border-[var(--orange)] transition-colors appearance-none"
              required
            ></select>
            <div
              class="pointer-events-none absolute right-0 bottom-4 text-gray-500"
            >
              <svg
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </div>
          </div>

          <!-- MEDIO DE PAGO -->
          <div class="form-group relative md:col-span-3">
            <label
              class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
              >Medio de pago</label
            >
            <select
              id="medioPago"
              class="w-full bg-transparent text-[var(--beige)] text-base border-b border-[#333] pb-2 focus:outline-none focus:border-[var(--orange)] transition-colors appearance-none"
              required
            ></select>
            <div
              class="pointer-events-none absolute right-0 bottom-4 text-gray-500"
            >
              <svg
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </div>
          </div>
        </div>
        <!-- DIVISOR DETALLE DEL PAGO -->
        <div
          class="flex items-center justify-between mb-4 mt-4 pb-2 border-b border-[#222]"
        >
          <h3 class="text-lg font-semibold text-white tracking-wide">
            Detalle del Pago
          </h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-5 items-end">
          <!-- TIPO DE DETALLE -->
          <div class="form-group relative md:col-span-3">
            <label
              class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
              >Ítem a cobrar</label
            >
            <select
              id="tipoDetalle"
              class="w-full bg-transparent text-[var(--beige)] text-base border-b border-[#333] pb-2 focus:outline-none focus:border-[var(--orange)] transition-colors appearance-none"
            >
              <option value="MEMBRESIA" class="bg-[#111]">Membresía</option>
              <option value="PRODUCTO" class="bg-[#111]">Producto</option>
            </select>
            <div
              class="pointer-events-none absolute right-0 bottom-4 text-gray-500"
            >
              <svg
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </div>
          </div>

          <!-- PRODUCTO / MEMBRESÍA (Ocupan el mismo espacio según el caso) -->
          <div class="md:col-span-9">
            <!-- GRUPO PRODUCTO -->
            <div
              id="productoGroup"
              class="grid grid-cols-1 sm:grid-cols-12 gap-4 items-end"
            >
              <div class="form-group relative sm:col-span-5">
                <label
                  class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
                  >Seleccionar Producto</label
                >
                <select
                  id="producto"
                  class="w-full bg-transparent text-[var(--beige)] text-base border-b border-[#333] pb-2 focus:outline-none focus:border-[var(--orange)] transition-colors appearance-none"
                ></select>
                <div
                  class="pointer-events-none absolute right-0 bottom-4 text-gray-500"
                >
                  <svg
                    class="h-4 w-4"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </div>
              <div class="form-group relative sm:col-span-2">
                <label
                  class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
                  >Cantidad</label
                >
                <input
                  type="number"
                  id="cantidad"
                  class="w-full bg-transparent text-[var(--beige)] text-center text-base border-b border-[#333] pb-2 focus:outline-none focus:border-[var(--orange)] transition-colors tabular-nums"
                  value="1"
                  min="1"
                />
              </div>
              <div class="form-group relative sm:col-span-3">
                <label
                  class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
                  >Precio Unitario</label
                >
                <span class="absolute left-0 bottom-2 text-gray-500">$</span>
                <input
                  type="number"
                  id="precio"
                  class="w-full bg-transparent text-gray-500 text-base border-b border-[#333] pb-2 pl-6 focus:outline-none transition-colors tabular-nums cursor-not-allowed"
                  readonly
                />
              </div>
              <div class="sm:col-span-2">
                <button
                  type="button"
                  id="btnAgregarDetalle"
                  class="w-full py-2.5 rounded-lg border border-[var(--orange)] text-[var(--orange)] text-sm font-medium hover:bg-[var(--orange)]/10 transition-colors flex justify-center items-center"
                  title="Añadir ítem"
                >
                  <svg
                    class="w-4 h-4 mr-1"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 4.5v15m7.5-7.5h-15"
                    />
                  </svg>
                  Añadir
                </button>
              </div>
            </div>

            <!-- GRUPO MEMBRESÍA -->
            <div
              id="membresiaGroup"
              class="grid grid-cols-1 sm:grid-cols-12 gap-4 items-end hidden"
            >
              <div class="form-group relative sm:col-span-5">
                <label
                  class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
                  >Seleccionar Membresía</label
                >
                <select
                  id="membresia"
                  class="w-full bg-transparent text-[var(--beige)] text-base border-b border-[#333] pb-2 focus:outline-none focus:border-[var(--orange)] transition-colors appearance-none"
                ></select>
                <div
                  class="pointer-events-none absolute right-0 bottom-4 text-gray-500"
                >
                  <svg
                    class="h-4 w-4"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </div>
              <div class="form-group relative sm:col-span-2">
                <label
                  class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
                  >Cantidad</label
                >
                <input
                  type="number"
                  id="cantidadMembresia"
                  class="w-full bg-transparent text-[#555] text-center text-base border-b border-[#333] pb-2 focus:outline-none transition-colors tabular-nums cursor-not-allowed"
                  value="1"
                  min="1"
                  disabled
                />
              </div>
              <div class="form-group relative sm:col-span-3">
                <label
                  class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
                  >Precio Unitario</label
                >
                <span class="absolute left-0 bottom-2 text-gray-500">$</span>
                <input
                  type="number"
                  id="precioMembresia"
                  class="w-full bg-transparent text-gray-500 text-base border-b border-[#333] pb-2 pl-6 focus:outline-none transition-colors tabular-nums cursor-not-allowed"
                  readonly
                />
              </div>
              <div class="sm:col-span-2">
                <button
                  type="button"
                  id="btnAgregarDetalleM"
                  class="w-full py-2.5 rounded-lg border border-[var(--orange)] text-[var(--orange)] text-sm font-medium hover:bg-[var(--orange)]/10 transition-colors flex justify-center items-center"
                  title="Añadir ítem"
                >
                  <svg
                    class="w-4 h-4 mr-1"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 4.5v15m7.5-7.5h-15"
                    />
                  </svg>
                  Añadir
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Descuento visual aplicado (bajo ambos grupos) -->
        <div id="infoDescuentoRow" class="mt-1">
          <span id="infoDescuentoMembresia" class="text-xs text-green-400 font-medium tracking-wide"></span>
        </div>

        <!-- SELECTOR FECHA INICIO MEMBRESÍA (Aparece abajo si hace falta) -->
        <div
          id="fechaInicioGroup"
          class="form-group hidden mt-4 pt-3 border-t border-gray-700/50"
        >
          <label class="form-label text-xs mb-1"
            >Renovación de Membresía:</label
          >
          <div
            class="flex flex-col sm:flex-row sm:flex-wrap sm:items-center gap-3 bg-gray-900/40 p-3 rounded-md border border-gray-700"
          >
            <label
              class="flex items-center gap-2 cursor-pointer text-sm text-gray-300 hover:text-white transition-colors"
            >
              <input
                type="radio"
                name="fechaInicio"
                value="vencimiento"
                class="accent-orange-500"
                checked
              />
              <span
                >Desde vencimiento (<span
                  id="lblFechaVencimiento"
                  class="text-orange-400"
                ></span
                >)</span
              >
            </label>
            <label
              class="flex items-center gap-2 cursor-pointer text-sm text-gray-300 hover:text-white transition-colors"
            >
              <input
                type="radio"
                name="fechaInicio"
                value="hoy"
                class="accent-orange-500"
              />
              <span>Desde hoy (<span id="lblFechaHoy"></span>)</span>
            </label>
            <div class="flex flex-wrap items-center gap-2">
              <label
                class="flex items-center gap-2 cursor-pointer text-sm text-gray-300 hover:text-white transition-colors"
              >
                <input
                  type="radio"
                  name="fechaInicio"
                  value="otro"
                  class="accent-orange-500"
                />
                <span>Personalizada:</span>
              </label>
              <div id="fechaCustomContainer" class="hidden">
                <input
                  type="date"
                  id="fechaCustom"
                  class="form-input text-xs py-1 px-2 h-7 w-32"
                />
              </div>
            </div>
          </div>
          <!-- Warning de asistencias pendientes no cubiertas -->
          <div
            id="warningAsistenciasPendientes"
            class="hidden mt-2 p-2.5 rounded-md bg-amber-500/10 border border-amber-500/30 text-amber-300 text-xs flex items-start gap-2"
          >
            <svg
              class="w-4 h-4 shrink-0 mt-0.5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
              />
            </svg>
            <span id="warningAsistenciasPendientesTexto"></span>
          </div>
        </div>
      </div>
    </form>

    <!-- TABLA DE DETALLES -->
    <section class="">
      <div class="glass-card overflow-hidden hidden" id="tableContainer">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr
                class="border-b border-[#222] bg-[#111]/50 text-xs uppercase tracking-widest text-gray-500"
              >
                <th class="py-2 px-3 font-medium">Tipo</th>
                <th class="py-2 px-3 font-medium">Descripción</th>
                <th class="py-2 px-3 font-medium text-center">Cantidad</th>
                <th class="py-2 px-3 font-medium text-right">Precio</th>
                <th class="py-2 px-3 font-medium text-center">Acción</th>
              </tr>
            </thead>
            <tbody id="detallesBody" class="text-sm divide-y divide-[#222]">
              <!-- Filas dinámicas -->
            </tbody>
          </table>
        </div>
      </div>
    </section>
    <!-- TOTALES, DESCUENTO Y ACCIÓN FINAL -->
    <section class="mt-4" aria-label="Resumen del pago">
      <div
        class="glass-card p-4 flex flex-col md:flex-row items-center justify-between gap-4 md:flex-wrap"
      >
        <!-- DESCUENTO -->
        <div
          class="w-full md:w-auto md:min-w-[200px] shrink-0 form-group relative mb-0 flex-1"
        >
          <label
            class="block text-[10px] uppercase tracking-widest text-gray-500 mb-1 font-medium"
            >Descuento Global</label
          >
          <select
            id="descuento"
            class="w-full bg-transparent text-[var(--beige)] text-sm border-b border-[#333] pb-1 focus:outline-none focus:border-[var(--orange)] transition-colors appearance-none"
          >
            <option value="" class="bg-[#111] text-gray-500">Ninguno</option>
          </select>
          <div
            class="pointer-events-none absolute right-0 bottom-5 text-gray-500"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              />
            </svg>
          </div>
          <p class="text-[9px] text-gray-600 mt-1 font-medium tracking-wide">
            * Aplica a Membresías.
          </p>
        </div>

        <div
          class="flex flex-col sm:flex-row items-center justify-end flex-wrap gap-4 shrink-0 w-full md:w-auto"
        >
          <!-- BARRA DE TOTALES (HUD) -->
          <div
            class="flex items-stretch divide-x divide-[#333] bg-[#0a0a0a] border border-[#222] rounded-xl overflow-hidden shrink-0 shadow-lg"
          >
            <div class="flex flex-col px-4 py-2 justify-center">
              <span
                class="text-[9px] text-gray-500 uppercase tracking-widest mb-1 font-medium"
                >Subtotal</span
              >
              <span id="lblSubtotal" class="text-sm font-medium text-gray-300"
                >$0.00</span
              >
            </div>
            <div class="flex flex-col px-4 py-2 justify-center">
              <span
                class="text-[9px] text-gray-500 uppercase tracking-widest mb-1 font-medium"
                >Descuento</span
              >
              <span id="lblDescuento" class="text-sm font-medium text-green-500"
                >-$0.00</span
              >
            </div>
            <div
              class="flex flex-col px-6 py-2 justify-center bg-[var(--orange)]/10 relative overflow-hidden"
            >
              <div
                class="absolute inset-0 bg-gradient-to-r from-transparent via-[var(--orange)]/5 to-transparent"
              ></div>
              <span
                class="text-[9px] text-[var(--orange)] uppercase tracking-widest mb-1 font-bold relative z-10"
                >Total</span
              >
              <span
                id="lblTotal"
                class="text-lg font-bold text-[var(--orange)] tabular-nums relative z-10"
                >$0.00</span
              >
            </div>
          </div>

          <!-- BOTÓN CONFIRMAR -->
          <button
            type="submit"
            form="pagoForm"
            class="btn-action-primary w-full sm:w-auto text-sm py-3 px-6 shadow-xl shadow-[var(--orange)]/20 shrink-0 h-full flex items-center justify-center gap-2"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            <span>Confirmar Pago</span>
          </button>
        </div>
      </div>
    </section>
  </div>
</main>
