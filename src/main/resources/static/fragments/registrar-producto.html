<main class="flex justify-center items-start min-h-screen p-6 pt-8">
  <div class="w-full max-w-2xl">
    <!-- Header -->
    <header
      class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8"
    >
      <div class="flex items-center gap-4">
        <div
          class="w-12 h-12 rounded-xl bg-[#111] flex items-center justify-center border border-[#222]"
        >
          <svg
            class="w-6 h-6 text-[var(--orange)]"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21 7.5l-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"
            />
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white tracking-tight">
            Alta de Producto
          </h1>
          <p class="text-sm text-gray-500 mt-0.5">
            Ingreso de stock e inventario
          </p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <a
          href="#/productos"
          id="btnVolver"
          class="glass-card flex items-center gap-2 px-4 py-2 hover:bg-[#161616] hover:text-white transition-colors text-sm font-medium text-gray-300"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"
            />
          </svg>
          Cancelar
        </a>
      </div>
    </header>

    <!-- Card -->
    <div class="glass-card p-0 overflow-hidden">
      <div class="p-6 border-b border-[#222] bg-[#0a0a0a]">
        <h2
          class="text-base font-bold text-white tracking-tight flex items-center gap-2"
        >
          <div
            class="w-8 h-8 rounded bg-[#1a1a1a] border border-[#333] flex items-center justify-center text-[var(--orange)]"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
              />
            </svg>
          </div>
          Ficha del Artículo
        </h2>
      </div>

      <!-- Form -->
      <form
        id="registrarProductoForm"
        class="p-6 md:p-8 space-y-6 bg-[#111]"
        novalidate
      >
        <div class="relative group">
          <label
            class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2"
            for="nombre"
            >Denominación Comercial
            <span class="text-[var(--orange)]">*</span></label
          >
          <input
            type="text"
            name="nombre"
            id="nombre"
            placeholder="Ej: Whey Protein Vainilla"
            class="w-full bg-transparent text-white placeholder-gray-600 px-0 py-2 border-b-2 border-[#333] focus:border-[var(--orange)] focus:outline-none transition-colors text-base font-bold"
          />
          <span
            class="form-error error text-red-400 text-xs mt-1.5 hidden break-words"
          ></span>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div class="relative group">
            <label
              class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2"
              for="precio"
              >PVP (Precio Venta)
              <span class="text-[var(--orange)]">*</span></label
            >
            <div class="relative flex items-center">
              <span class="absolute left-0 text-xl font-bold text-gray-500"
                >$</span
              >
              <input
                type="number"
                name="precio"
                id="precio"
                step="0.01"
                min="0"
                placeholder="0.00"
                class="w-full bg-transparent text-emerald-400 placeholder-gray-600 pl-6 py-2 border-b-2 border-[#333] focus:border-[var(--orange)] focus:outline-none transition-colors text-2xl font-black font-mono tracking-tight"
              />
            </div>
            <span
              class="form-error error text-red-400 text-xs mt-1.5 hidden break-words"
            ></span>
          </div>

          <div class="relative group">
            <label
              class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2"
              for="stock"
              >Stock Físico <span class="text-[var(--orange)]">*</span></label
            >
            <input
              type="number"
              name="stock"
              id="stock"
              min="0"
              placeholder="0"
              class="w-full bg-transparent text-white placeholder-gray-600 px-0 py-2 border-b-2 border-[#333] focus:border-[var(--orange)] focus:outline-none transition-colors text-2xl font-black font-mono tracking-tight text-center"
            />
            <span
              class="form-error error text-red-400 text-xs mt-1.5 hidden break-words"
            ></span>
          </div>
        </div>

        <div class="mt-8 pt-6 border-t border-[#222] flex justify-end">
          <button
            type="submit"
            class="bg-[var(--orange)] hover:bg-[#e07a27] text-black font-bold flex items-center gap-2 px-8 py-3 rounded-lg transition-colors text-sm shadow-[0_0_15px_rgba(255,140,50,0.3)] w-full justify-center"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 4.5v15m7.5-7.5h-15"
              />
            </svg>
            <span>Dar de Alta Producto</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
