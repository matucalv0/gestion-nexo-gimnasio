<main class="flex justify-center items-start min-h-screen p-6 pt-8">
  <div class="w-full max-w-4xl">
    <!-- Header -->
    <header
      class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8"
    >
      <div class="flex items-center gap-4">
        <div
          class="w-12 h-12 rounded-xl bg-[#111] flex items-center justify-center border border-[#222]"
        >
          <svg
            class="w-6 h-6 text-[var(--orange)]"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
            />
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white tracking-tight">
            Registrar Socio
          </h1>
          <p class="text-sm text-gray-500 mt-0.5">Nuevo miembro del gimnasio</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <a
          href="#/socios"
          id="btnVolver"
          class="glass-card flex items-center gap-2 px-4 py-2 hover:bg-[#161616] hover:text-white transition-colors text-sm font-medium text-gray-300"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"
            />
          </svg>
          Cancelar
        </a>
      </div>
    </header>

    <!-- Card -->
    <div class="glass-card p-0 overflow-hidden">
      <div class="p-6 border-b border-[#222] bg-[#0a0a0a]">
        <h2
          class="text-base font-bold text-white tracking-tight flex items-center gap-2"
        >
          <div
            class="w-8 h-8 rounded bg-[#1a1a1a] border border-[#333] flex items-center justify-center text-[var(--orange)]"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
              />
            </svg>
          </div>
          Ficha de Ingreso
        </h2>
      </div>

      <form id="registrarSocioForm" class="p-6 md:p-8 space-y-8 bg-[#111]">
        <!-- PANEL 1: DATOS PERSONALES -->
        <div class="space-y-5">
          <h3
            class="text-xs font-bold text-[#666] uppercase tracking-widest border-b border-[#222] pb-3 flex items-center gap-3"
          >
            <span
              class="w-6 h-6 rounded-full bg-[#222] flex items-center justify-center text-white text-[10px]"
              >1</span
            >
            Información Personal
          </h3>

          <div class="grid grid-cols-1 md:grid-cols-12 gap-x-6 gap-y-5">
            <div class="md:col-span-6 relative group">
              <label
                class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2"
                for="nombre"
                >Nombre completo
                <span class="text-[var(--orange)]">*</span></label
              >
              <input
                id="nombre"
                name="nombre"
                type="text"
                placeholder="Ej: Juan Pérez"
                class="w-full bg-transparent text-white placeholder-gray-600 px-0 py-2 border-b-2 border-[#333] focus:border-[var(--orange)] focus:outline-none transition-colors text-base"
              />
              <span
                class="error text-red-400 text-xs mt-1.5 hidden break-words"
              ></span>
            </div>

            <div class="md:col-span-3 relative group">
              <label
                class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2"
                for="dni"
                >DNI <span class="text-[var(--orange)]">*</span></label
              >
              <input
                id="dni"
                name="dni"
                type="text"
                placeholder="Sin puntos"
                class="w-full bg-transparent text-white placeholder-gray-600 px-0 py-2 border-b-2 border-[#333] focus:border-[var(--orange)] focus:outline-none transition-colors text-base font-mono"
              />
              <span
                class="error text-red-400 text-xs mt-1.5 hidden break-words"
              ></span>
            </div>

            <div class="md:col-span-3 relative group">
              <label
                class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2"
                for="fechaNacimiento"
                >Nacimiento <span class="text-[var(--orange)]">*</span></label
              >
              <div class="relative">
                <input
                  id="fechaNacimiento"
                  name="fechaNacimiento"
                  type="text"
                  placeholder="Seleccionar"
                  readonly
                  class="w-full bg-transparent text-white placeholder-gray-600 px-0 py-2 border-b-2 border-[#333] focus:border-[var(--orange)] focus:outline-none transition-colors text-base cursor-pointer"
                />
                <svg
                  class="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500 pointer-events-none"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"
                  />
                </svg>
              </div>
              <span
                class="error text-red-400 text-xs mt-1.5 hidden break-words"
              ></span>
            </div>
          </div>
        </div>

        <!-- PANEL 2: DATOS DE CONTACTO -->
        <div class="space-y-5 pt-4">
          <h3
            class="text-xs font-bold text-[#666] uppercase tracking-widest border-b border-[#222] pb-3 flex items-center gap-3"
          >
            <span
              class="w-6 h-6 rounded-full bg-[#222] flex items-center justify-center text-white text-[10px]"
              >2</span
            >
            Datos de Contacto
          </h3>

          <div class="grid grid-cols-1 md:grid-cols-12 gap-x-6 gap-y-5">
            <div class="md:col-span-6 relative group">
              <label
                class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2"
                for="email"
                >Email <span class="text-[var(--orange)]">*</span></label
              >
              <input
                id="email"
                name="email"
                type="email"
                placeholder="correo@ejemplo.com"
                class="w-full bg-transparent text-white placeholder-gray-600 px-0 py-2 border-b-2 border-[#333] focus:border-[var(--orange)] focus:outline-none transition-colors text-base"
              />
              <span
                class="error text-red-400 text-xs mt-1.5 hidden break-words"
              ></span>
            </div>

            <div class="md:col-span-6 relative group">
              <label
                class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2"
                for="telefono"
                >Teléfono <span class="text-[var(--orange)]">*</span></label
              >
              <input
                id="telefono"
                name="telefono"
                type="tel"
                placeholder="Ej: 1155667788"
                class="w-full bg-transparent text-white placeholder-gray-600 px-0 py-2 border-b-2 border-[#333] focus:border-[var(--orange)] focus:outline-none transition-colors text-base font-mono"
              />
              <span
                class="error text-red-400 text-xs mt-1.5 hidden break-words"
              ></span>
            </div>
          </div>
        </div>

        <!-- ACTIONS -->
        <div class="mt-10 pt-6 border-t border-[#222] flex justify-end">
          <button
            type="submit"
            id="btnRegistrar"
            class="bg-[var(--orange)] hover:bg-[#e07a27] text-black font-bold flex items-center gap-2 px-8 py-3 rounded-lg transition-colors text-sm shadow-[0_0_15px_rgba(255,140,50,0.3)] w-full md:w-auto justify-center"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z"
              />
            </svg>
            <span>Confirmar Registro</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
