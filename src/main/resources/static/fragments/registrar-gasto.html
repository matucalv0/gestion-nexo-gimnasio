<main class="flex justify-center items-start min-h-screen p-4 pt-8">
  <div class="w-full max-w-xl">
    <!-- HEADER -->
    <header class="page-header mb-4">
      <div class="page-header-icon page-header-icon-danger">
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
      <div class="page-header-content">
        <h1 class="page-header-title">Registrar Gasto</h1>
        <p class="page-header-subtitle">Nuevo egreso</p>
      </div>
      <div class="page-header-actions">
        <button onclick="history.back()" class="btn-outline btn-sm">
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"
            />
          </svg>
          <span>Volver</span>
        </button>
      </div>
    </header>

    <!-- Alertas -->
    <div id="alert-container" class="mb-4"></div>

    <!-- CARD -->
    <div class="glass-card flex flex-col p-5">
      <div
        class="flex items-center justify-between mb-5 pb-2 border-b border-[#222]"
      >
        <h2 class="text-xl font-semibold text-white tracking-wide">
          Detalles del gasto
        </h2>
      </div>

      <form id="gastoForm" class="flex flex-col gap-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- CATEGORIA -->
          <div class="form-group relative">
            <label
              class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
              for="categoria"
              >Categoría <span class="text-[var(--orange)]">*</span></label
            >
            <select
              id="categoria"
              class="w-full bg-transparent text-[var(--beige)] text-base border-b border-[#333] pb-2 focus:outline-none focus:border-[var(--orange)] transition-colors appearance-none"
              required
            >
              <option value="" class="bg-[#111] text-gray-500">
                Seleccione...
              </option>
              <option value="ALQUILER" class="bg-[#111]">Alquiler</option>
              <option value="SERVICIOS" class="bg-[#111]">Servicios</option>
              <option value="INSUMOS" class="bg-[#111]">Insumos</option>
              <option value="SUELDOS" class="bg-[#111]">Sueldos</option>
            </select>
            <div
              class="pointer-events-none absolute right-0 bottom-4 text-gray-500"
            >
              <svg
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </div>
          </div>

          <!-- MONTO -->
          <div class="form-group relative">
            <label
              class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
              for="monto"
              >Monto <span class="text-[var(--orange)]">*</span></label
            >
            <span class="absolute left-0 bottom-2 text-gray-500">$</span>
            <input
              type="number"
              id="monto"
              min="1"
              required
              class="w-full bg-transparent text-[var(--beige)] text-base border-b border-[#333] pb-2 pl-6 focus:outline-none focus:border-[var(--orange)] transition-colors tabular-nums placeholder-gray-700"
              placeholder="0.00"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- MEDIO DE PAGO -->
          <div class="form-group relative">
            <label
              class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
              for="medioPago"
              >Medio de pago <span class="text-[var(--orange)]">*</span></label
            >
            <select
              id="medioPago"
              class="w-full bg-transparent text-[var(--beige)] text-base border-b border-[#333] pb-2 focus:outline-none focus:border-[var(--orange)] transition-colors appearance-none"
              required
            ></select>
            <div
              class="pointer-events-none absolute right-0 bottom-4 text-gray-500"
            >
              <svg
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </div>
          </div>

          <!-- DESCRIPCION (PROVEEDOR) -->
          <div class="form-group">
            <label
              class="block text-xs uppercase tracking-widest text-gray-500 mb-1 font-medium"
              for="descripcion"
              >Proveedor</label
            >
            <input
              type="text"
              id="descripcion"
              class="w-full bg-transparent text-[var(--beige)] text-base border-b border-[#333] pb-2 focus:outline-none focus:border-[var(--orange)] transition-colors placeholder-gray-700"
              placeholder="Ej: Edenor, Cablevisión, Limpieza S.A."
            />
          </div>
        </div>

        <!-- BOTON -->
        <div class="mt-8 pt-6 border-t border-[#222] flex justify-end">
          <button
            type="submit"
            class="btn-danger flex items-center gap-2 px-8 py-3 w-full sm:w-auto"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            <span>Registrar egreso</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
