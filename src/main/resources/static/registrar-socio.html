<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../assets/nexologo.png" />
  <title>NEXO · REGISTRAR SOCIO</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="preload" as="image" href="../assets/nexofondo.jpg">

  <!-- Flatpickr Datepicker -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
  <meta name="view-transition" content="same-origin" />
</head>

<body class="min-h-screen text-gray-300">

  <main class="flex justify-center items-start min-h-screen p-6 pt-12">
    <div class="w-full max-w-4xl">

      <!-- Header -->
      <header class="page-header mb-6">
        <div class="page-header-icon">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
        </div>
        <div class="page-header-content">
          <h1 class="page-header-title">Registrar Socio</h1>
          <p class="page-header-subtitle">Nuevo miembro del gimnasio</p>
        </div>
        <div class="page-header-actions">
          <button id="btnVolver" class="btn-outline btn-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            <span>Volver</span>
          </button>
        </div>
      </header>

      <!-- Card -->
      <div class="card-container">
        <div class="card-toolbar">
          <h2 class="card-toolbar-title">Datos del Socio</h2>
        </div>

        <form id="registrarSocioForm" class="form-container">

          <!-- PANEL 1: DATOS PERSONALES -->
          <div class="bg-gray-800/30 border border-gray-700/50 p-4 rounded-lg space-y-3">
            <h3 class="text-white font-semibold border-b border-gray-700/50 pb-2 text-sm tracking-wide uppercase">1.
              Información Personal</h3>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-start">

              <div class="form-group md:col-span-6 mb-0">
                <label class="form-label text-sm mb-1" for="nombre">Nombre completo <span
                    class="text-red-400">*</span></label>
                <input id="nombre" name="nombre" type="text" placeholder="Ingrese el nombre completo"
                  class="form-input text-sm py-2" />
                <span class="error text-red-400 text-xs mt-1 ml-1 hidden"></span>
              </div>

              <div class="form-group md:col-span-3 mb-0">
                <label class="form-label text-sm mb-1" for="dni">DNI <span class="text-red-400">*</span></label>
                <input id="dni" name="dni" type="text" placeholder="Ingrese su DNI" class="form-input text-sm py-2" />
                <span class="error text-red-400 text-xs mt-1 ml-1 hidden"></span>
              </div>

              <div class="form-group md:col-span-3 mb-0">
                <label class="form-label text-sm mb-1" for="fechaNacimiento">Fecha nacimiento <span
                    class="text-red-400">*</span></label>
                <input id="fechaNacimiento" name="fechaNacimiento" type="text" placeholder="Seleccionar" readonly
                  class="form-input text-sm py-2 cursor-pointer" />
                <span class="error text-red-400 text-xs mt-1 ml-1 hidden"></span>
              </div>

            </div>
          </div>

          <!-- PANEL 2: DATOS DE CONTACTO -->
          <div class="bg-gray-800/30 border border-gray-700/50 p-4 rounded-lg space-y-3">
            <h3 class="text-white font-semibold border-b border-gray-700/50 pb-2 text-sm tracking-wide uppercase">2.
              Datos de Contacto</h3>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-start">

              <div class="form-group md:col-span-6 mb-0">
                <label class="form-label text-sm mb-1" for="email">Email <span class="text-red-400">*</span></label>
                <input id="email" name="email" type="email" placeholder="ejemplo@email.com"
                  class="form-input text-sm py-2" />
                <span class="error text-red-400 text-xs mt-1 ml-1 hidden"></span>
              </div>

              <div class="form-group md:col-span-6 mb-0">
                <label class="form-label text-sm mb-1" for="telefono">Teléfono <span
                    class="text-red-400">*</span></label>
                <input id="telefono" name="telefono" type="tel" placeholder="Ingrese su teléfono"
                  class="form-input text-sm py-2" />
                <span class="error text-red-400 text-xs mt-1 ml-1 hidden"></span>
              </div>

            </div>
          </div>

          <!-- ACTIONS -->
          <div class="form-actions border-t border-gray-800/50 pt-4 flex justify-end">
            <button type="submit" id="btnRegistrar" class="btn-action-primary flex items-center gap-2 px-6">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
              </svg>
              <span>Registrar Socio</span>
            </button>
          </div>

        </form>
      </div>

    </div>
  </main>

  <script type="module" src="../js/pages/registrar-socio.js"></script>

  <!-- Inicializar Flatpickr -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      flatpickr('#fechaNacimiento', {
        locale: 'es',
        dateFormat: 'Y-m-d',
        altInput: true,
        altFormat: 'd/m/Y',
        maxDate: 'today',
        defaultDate: null,
        disableMobile: true,
        monthSelectorType: 'dropdown',
        yearRange: [1940, new Date().getFullYear() - 10]
      });
    });
  </script>
  <script src="../js/ui/sidebar.js"></script>
</body>

</html>
